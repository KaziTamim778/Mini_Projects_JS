<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <span id="progress-text">Question 1 / 10</span>
            <span id="score-text">Score: 0</span>
        </div>

        <div id="quiz-area">
            <h2 id="question-text">Loading question...</h2>
            
            <input type="text" id="answer-input" placeholder="Type your answer here..." autocomplete="off">
            
            <div id="feedback-text" class="feedback"></div>
            
            <button id="submit-btn">Submit Answer</button>
        </div>

        <div id="result-area" class="hidden">
            <h2>Quiz Complete! 🎉</h2>
            <p id="final-score">You scored 0 out of 10.</p>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
