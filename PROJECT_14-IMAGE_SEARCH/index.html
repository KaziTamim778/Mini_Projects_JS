<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Search Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Visual Explorer</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search for high-resolution images..." autocomplete="off">
            <button id="search-btn">Search</button>
        </div>
    </header>

    <main class="container">
        <div id="image-results" class="gallery"></div>
        
        <button id="show-more-btn" class="hidden">Show More</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
