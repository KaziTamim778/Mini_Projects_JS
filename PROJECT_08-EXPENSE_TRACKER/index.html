<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Expense Tracker</h2>

        <div class="balance-container">
            <h4>Your Balance</h4>
            <h1 id="balance">$0.00</h1>
        </div>

        <div class="inc-exp-container">
            <div>
                <h4>Income</h4>
                <p id="money-plus" class="money plus">+$0.00</p>
            </div>
            <div>
                <h4>Expense</h4>
                <p id="money-minus" class="money minus">-$0.00</p>
            </div>
        </div>

        <h3>History</h3>
        <ul id="transaction-list" class="list">
            </ul>

        <h3>Add New Transaction</h3>
        <div class="form-control">
            <label for="desc-input">Description</label>
            <input type="text" id="desc-input" placeholder="e.g. Salary, Groceries..." />
        </div>

        <div class="form-control">
            <label for="amount-input">Amount</label>
            <input type="number" id="amount-input" placeholder="Enter amount..." />
        </div>

        <div class="form-control">
            <label for="type-input">Transaction Type</label>
            <select id="type-input">
                <option value="income">Income (+)</option>
                <option value="expense">Expense (-)</option>
            </select>
        </div>

        <button id="add-btn" class="btn">Add Transaction</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
